# Modular addition, p=113, 1-layer, seed 0.
task: modular
op: "+"
p: 113

seed: 0
train_frac: 0.50
val_frac: 0.10

n_layer: 1
n_head: 4
n_embd: 128
block_size: 16
dropout: 0.0
bias: true

optimizer: adam
lr: 0.001
beta1: 0.9
beta2: 0.98
weight_decay: 0.0
grad_clip: 1.0

batch_size: 512
max_steps: 100000
eval_every: 500
eval_batch_size: 4096

out_dir: runs/add_p113_l1_seed0
