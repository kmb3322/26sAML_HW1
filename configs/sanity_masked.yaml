# Sanity check #2: same sentence but treat the first 3 tokens as a prompt
# ([BOS, I, love]) and mask the loss on predictions made *inside* that prompt.
# Trained targets are then [machine, learning, EOS], and prompting with
# "[BOS] I love" must greedily produce "machine learning [EOS]".
task: sanity
seed: 0
sanity_prompt_len: 3

n_layer: 1
n_head: 2
n_embd: 64
block_size: 16
dropout: 0.0
bias: true

optimizer: adam
lr: 0.001
beta1: 0.9
beta2: 0.99
weight_decay: 0.0
grad_clip: 1.0

batch_size: 1
max_steps: 2000
eval_every: 100
eval_batch_size: 16

out_dir: runs/sanity_masked
