# Modular division grokking, p=97, 2-layer, seed 0.
# Power et al. (2022) baseline-ish: AdamW, weight_decay=1.0, lr=1e-3, betas=(0.9,0.98).
task: modular
op: "/"
p: 97

seed: 0
train_frac: 0.50
val_frac: 0.10

n_layer: 2
n_head: 4
n_embd: 128
block_size: 16
dropout: 0.0
bias: true

optimizer: adamw
lr: 0.001
beta1: 0.9
beta2: 0.98
weight_decay: 1.0
grad_clip: 1.0

batch_size: 512
max_steps: 100000
eval_every: 500
eval_batch_size: 4096

out_dir: runs/div_p97_grokking_seed0
